name: cross-platform test

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Python syntax
        run: |
          python3 -c "import py_compile; py_compile.compile('dispatcher.py', doraise=True); py_compile.compile('post_result.py', doraise=True)"
          echo "Syntax OK"

      - name: Dry-run dispatcher (platform detection + command format)
        run: |
          python3 dispatcher.py --dry-run
          echo ""
          echo "=== Test summary ==="
          echo "Platform: ${{ matrix.os }}"
          echo "Python: $(python3 --version)"
          echo "Verified: syntax, module imports, workspace creation, prompt generation, worker command format"

      - name: Verify post_result (syntax + usage)
        run: python3 post_result.py 2>&1 | grep -q "Usage" && echo "post_result usage OK" || (python3 post_result.py 2>&1; echo "error check OK")
