version: "0.1"
task_id: TASK-0001
title: Add service health-check endpoint
objective: Deliver a health-check endpoint with test coverage and no infra changes.

repository:
  path: /workspace/example-repo
  default_branch: main
  working_branch: damon/task-0001-health-check
  target_branch: main

acceptance_criteria:
  - A health-check endpoint returns HTTP 200 and structured JSON.
  - Unit tests cover the healthy path and one failure path.
  - No infrastructure or CI workflow files are changed.

constraints:
  allowed_paths:
    - src/**
    - tests/**
  forbidden_paths:
    - infra/**
    - .github/workflows/**
  max_changed_files: 12

inputs:
  architecture_refs:
    - docs/architecture.md
  policy_ref: configs/execution_policy.yaml
  related_issues:
    - https://gitlab.example.com/group/project/-/issues/123

plan:
  parent_goal: Stabilize service observability basics.
  depends_on: []
  estimated_complexity: small
  owning_agent: implementer
  worker_type: codex

deliverables:
  code_changes_required: true
  tests_required: true
  docs_required: false
  expected_outputs:
    - patch
    - implementation_notes
    - test_evidence
    - risk_summary

handoff:
  must_produce:
    - implementation_notes
    - test_evidence
    - risk_summary
  reviewer: reviewer
  merge_request_template: default

escalation_rules:
  stop_if:
    - missing_required_secret
    - requirement_conflict_with_definition_of_done
    - unsafe_schema_migration
  notify_if:
    - test_runtime_exceeds_budget
